<!DOCTYPE html>
<html lang="nl">
<head.>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verborgen Bedrijven</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Google Sans', 'Inter', system-ui, sans-serif; background: #fff; color: #111; display: flex; height: 100vh; overflow: hidden; min-width: 0; }
    button { font-family: inherit; cursor: pointer; }
    button:focus { outline: none; }
    ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: #ddd; }

    /* Sidebar */
    #sidebar { flex-shrink: 0; background: #fff; width: 56px; border-right: 1px solid #e8e8e8; display: flex; flex-direction: column; transition: width .28s cubic-bezier(.4,0,.2,1); overflow: hidden; }
    #sidebar.open { width: 200px; }
    #logo { height: 56px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #e8e8e8; cursor: pointer; flex-shrink: 0; }
    nav { flex: 1; padding: 8px 0; }
    .nav-btn { display: flex; align-items: center; gap: 14px; width: 100%; padding: 10px 19px; background: none; border: none; color: #bbb; transition: color .15s; }
    .nav-btn svg { flex-shrink: 0; }
    .nav-btn.active { color: #111; }
    .nav-btn .label { font-size: 13px; white-space: nowrap; opacity: 0; transition: opacity .18s; }
    #sidebar.open .nav-btn .label { opacity: 1; }
    #sidebar-toggle { height: 44px; display: flex; align-items: center; justify-content: center; background: none; border: none; border-top: 1px solid #e8e8e8; color: #bbb; transition: color .15s; width: 100%; }
    #sidebar-toggle:hover { color: #555; }

    /* Main */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    #topbar { height: 56px; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; padding: 0 40px; font-size: 15px; flex-shrink: 0; }
    #content { flex: 1; overflow-y: auto; padding: 40px; }
    .page { display: none; max-width: 700px; }
    .page.active { display: block; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: #e8e8e8; border: 1px solid #e8e8e8; margin-bottom: 40px; }
    .stat-box { background: #fff; padding: 22px 24px; }
    .stat-value { font-size: 28px; color: #111; margin-bottom: 6px; }
    .stat-label { font-size: 10px; color: #bbb; text-transform: uppercase; letter-spacing: .09em; }

    .section-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: .09em; margin-bottom: 14px; }

    /* Tabs */
    .tab-bar { display: flex; border-bottom: 1px solid #e8e8e8; }
    .tab { padding: 8px 18px; background: none; border: none; border-bottom: 2px solid transparent; font-size: 13px; color: #aaa; transition: all .15s; margin-bottom: -1px; font-family: inherit; }
    .tab.active { color: #111; border-bottom-color: #111; }

    /* Table */
    .table-header { display: grid; grid-template-columns: 1fr 90px 80px 110px 20px; gap: 12px; padding: 10px 0; border-bottom: 1px solid #111; }
    .table-header span { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: .09em; }
    .table-row { display: grid; grid-template-columns: 1fr 90px 80px 110px 20px; gap: 12px; align-items: center; padding: 13px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background .1s; }
    .table-row:hover { background: #fafafa; }
    .table-row:last-child { border-bottom: none; }
    .company-name { font-size: 14px; color: #111; margin-bottom: 2px; }
    .company-website { font-size: 12px; color: #aaa; }

    /* Score bar */
    .score-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .score-track { flex: 1; height: 1px; background: #e0e0e0; }
    .score-fill { height: 100%; background: #111; transition: width .3s; }
    .score-pct { font-size: 12px; color: #111; min-width: 28px; text-align: right; }

    /* Status badge */
    .status-badge { font-size: 11px; padding: 3px 10px; border: 1px solid #e8e8e8; color: #888; white-space: nowrap; display: inline-block; cursor: pointer; transition: all .15s; }
    .status-badge.contacted { border-color: #111; color: #111; }
    .status-badge.interested { border-color: #111; background: #111; color: #fff; }
    .status-badge.not-interested { border-color: #ddd; color: #ccc; }

    /* History */
    .history-list { border: 1px solid #e8e8e8; }
    .history-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background .1s; }
    .history-row:last-child { border-bottom: none; }
    .history-row:hover { background: #fafafa; }
    .history-title { font-size: 13px; color: #111; margin-bottom: 3px; }
    .history-sub { font-size: 12px; color: #bbb; }

    /* Form */
    .form-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: .09em; margin-bottom: 12px; display: block; }
    .sector-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
    .sector-btn { padding: 7px 18px; border: 1px solid #e8e8e8; background: #fff; color: #777; font-size: 13px; transition: all .15s; font-family: inherit; }
    .sector-btn.active { background: #111; color: #fff; border-color: #111; }
    .slider-wrap { margin-bottom: 32px; }
    .slider-labels { display: flex; justify-content: space-between; font-size: 11px; color: #ccc; margin-top: 6px; }
    input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 1px; background: #ddd; outline: none; cursor: pointer; margin-top: 8px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #111; cursor: pointer; transition: transform .15s; }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    input[type=range]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #111; border: none; }

    /* Buttons */
    .btn-primary { padding: 9px 24px; background: #111; color: #fff; border: none; font-size: 13px; display: inline-flex; align-items: center; gap: 8px; transition: background .15s; font-family: inherit; }
    .btn-primary:disabled { background: #e0e0e0; color: #aaa; cursor: not-allowed; }
    .btn-ghost { padding: 7px 16px; background: #fff; color: #111; border: 1px solid #e8e8e8; font-size: 12px; font-family: inherit; transition: all .15s; }
    .btn-ghost:hover { border-color: #111; }

    /* Spinner */
    .spinner { width: 13px; height: 13px; border: 1.5px solid #aaa; border-top-color: #555; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Sector loading */
    .sector-loading { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
    .sector-load-row { display: flex; align-items: center; gap: 12px; font-size: 13px; }
    .sector-load-row .s-name { width: 100px; color: #555; }
    .sector-load-row .s-bar { flex: 1; height: 1px; background: #eee; position: relative; overflow: hidden; }
    .sector-load-row .s-bar-fill { height: 100%; background: #111; width: 0%; transition: width .4s; }
    .sector-load-row .s-status { font-size: 11px; color: #bbb; width: 70px; text-align: right; }
    .sector-load-row.done .s-status { color: #111; }
    .sector-load-row.error-row .s-status { color: #c00; }

    .error-msg { font-size: 13px; color: #c00; margin-bottom: 16px; }
    .empty-msg { font-size: 14px; color: #bbb; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.08); z-index: 300; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #fff; border: 1px solid #111; max-width: 540px; width: calc(100% - 48px); max-height: 88vh; overflow-y: auto; padding: 32px 36px; }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
    .modal-title { font-size: 18px; color: #111; margin-bottom: 4px; }
    .modal-sub { font-size: 13px; color: #aaa; }
    .close-btn { background: none; border: none; color: #aaa; cursor: pointer; padding: 0; display: flex; flex-shrink: 0; }
    .criteria-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
    .criteria-table tr { border-top: 1px solid #f0f0f0; }
    .criteria-table td { padding: 11px 0; font-size: 13px; }
    .criteria-table td:last-child { text-align: right; }
    .badge-hidden { font-size: 11px; color: #111; border-bottom: 1px solid #111; padding-bottom: 1px; }
    .badge-visible { font-size: 11px; color: #aaa; }
    .modal-summary { font-size: 13px; color: #777; line-height: 1.75; border-top: 1px solid #f0f0f0; padding-top: 16px; }

    /* Notes */
    .notes-area { width: 100%; border: 1px solid #e8e8e8; padding: 10px 12px; font-size: 13px; font-family: inherit; color: #111; resize: vertical; min-height: 80px; outline: none; transition: border-color .15s; margin-top: 8px; }
    .notes-area:focus { border-color: #111; }

    /* Contact */
    .contact-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .contact-val { font-size: 13px; color: #111; }
    .contact-label { font-size: 11px; color: #bbb; text-transform: uppercase; letter-spacing: .07em; width: 60px; }

    /* Status selector */
    .status-options { display: flex; gap: 8px; margin-top: 8px; }
    .status-opt { padding: 6px 14px; border: 1px solid #e8e8e8; background: #fff; font-size: 12px; color: #888; font-family: inherit; transition: all .15s; }
    .status-opt.active-none { border-color: #111; color: #111; }
    .status-opt.active-contacted { border-color: #111; color: #111; }
    .status-opt.active-interested { border-color: #111; background: #111; color: #fff; }
    .status-opt.active-not-interested { border-color: #ddd; background: #f5f5f5; color: #aaa; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="logo" onclick="toggleSidebar()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="flex-shrink:0">
      <rect x="4" y="4" width="10" height="10" fill="#111" transform="rotate(45 9 9)"/>
    </svg>
  </div>
  <nav>
    <button class="nav-btn active" data-page="dashboard" onclick="navigate('dashboard',this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span class="label">Dashboard</span>
    </button>
    <button class="nav-btn" data-page="scan" onclick="navigate('scan',this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span class="label">Nieuwe scan</span>
    </button>
    <button class="nav-btn" data-page="history" onclick="navigate('history',this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      <span class="label">Geschiedenis</span>
    </button>
  </nav>
  <button id="sidebar-toggle" onclick="toggleSidebar()">
    <svg id="toggle-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
  </button>
</div>

<div id="main">
  <div id="topbar">Dashboard</div>
  <div id="content">

    <div id="page-dashboard" class="page active">
      <div id="dash-stats" style="display:none"></div>
      <div id="dash-prev" style="display:none;margin-bottom:48px"></div>
      <div class="section-label">Nieuwe scan</div>
      <div id="dash-scan-form"></div>
    </div>

    <div id="page-scan" class="page" style="max-width:480px">
      <div id="scan-form"></div>
    </div>

    <div id="page-history" class="page">
      <div id="history-content"></div>
    </div>

  </div>
</div>

<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div id="modal-content"></div>
  </div>
</div>

<script>
const SECTORS = ["Schoonmaak","Logistiek","Ingenieurs"];
const PROXY = "https://verborgen-proxy-ljtwbenwa-pim-6182s-projects.vercel.app/api/proxy";
const CRITERIA = [
  {key:"noSocials",label:"Geen social media"},
  {key:"noJobBoards",label:"Geen vacaturebanken"},
  {key:"noRecruitmentAds",label:"Geen wervingsadvertenties"},
];
const STATUS_LABELS = { "": "Geen status", contacted: "Benaderd", interested: "Geïnteresseerd", "not-interested": "Niet interessant" };

let selectedSectors = [...SECTORS];
let companyCount = 5;
let sideOpen = false;
let activeSector = "Alle";

// Persist history + notes + status in localStorage
let history = JSON.parse(localStorage.getItem("vb_history") || "[]");
let notes = JSON.parse(localStorage.getItem("vb_notes") || "{}");
let statuses = JSON.parse(localStorage.getItem("vb_statuses") || "{}");

function save() {
  localStorage.setItem("vb_history", JSON.stringify(history));
  localStorage.setItem("vb_notes", JSON.stringify(notes));
  localStorage.setItem("vb_statuses", JSON.stringify(statuses));
}

function companyKey(c) { return (c.name + "_" + c.sector).replace(/\s+/g,"_"); }

// Sidebar
function toggleSidebar() {
  sideOpen = !sideOpen;
  document.getElementById("sidebar").classList.toggle("open", sideOpen);
  document.getElementById("toggle-icon").innerHTML = sideOpen
    ? '<path d="M15 18l-6-6 6-6"/>'
    : '<path d="M9 18l6-6-6-6"/>';
}

function navigate(page, btn) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-" + page).classList.add("active");
  if (btn) btn.classList.add("active");
  const titles = { dashboard:"Dashboard", scan:"Nieuwe scan", history:"Geschiedenis" };
  document.getElementById("topbar").textContent = titles[page];
  if (page === "history") renderHistory();
  if (page === "dashboard") renderDashboard();
}

// Score bar
function scoreBarHTML(score) {
  const pct = Math.round((score / 3) * 100);
  return `<div class="score-bar-wrap"><div class="score-track"><div class="score-fill" style="width:${pct}%"></div></div><span class="score-pct">${pct}%</span></div>`;
}

// Status badge
function statusBadgeHTML(c) {
  const k = companyKey(c);
  const s = statuses[k] || "";
  const map = { "":"Geen status", contacted:"Benaderd", interested:"Geïnteresseerd", "not-interested":"Niet interessant" };
  return `<span class="status-badge ${s}" onclick="event.stopPropagation();cycleStatus('${k}')">${map[s]}</span>`;
}

function cycleStatus(k) {
  const order = ["", "contacted", "interested", "not-interested"];
  const cur = statuses[k] || "";
  statuses[k] = order[(order.indexOf(cur) + 1) % order.length];
  save();
  renderDashboard();
}

// Scan form
function scanFormHTML(id) {
  return `
    <label class="form-label">Sectoren</label>
    <div class="sector-btns" id="sector-btns-${id}">
      ${SECTORS.map(s=>`<button class="sector-btn ${selectedSectors.includes(s)?'active':''}" onclick="toggleSector('${s}','${id}')">${s}</button>`).join("")}
    </div>
    <div class="slider-wrap">
      <label class="form-label">Bedrijven per sector — <span id="count-label-${id}">${companyCount}</span></label>
      <input type="range" min="3" max="15" step="1" value="${companyCount}" oninput="updateCount(this.value,'${id}')"/>
      <div class="slider-labels"><span>3</span><span>15</span></div>
    </div>
    <div id="sector-progress-${id}" style="display:none" class="sector-loading"></div>
    <div class="error-msg" id="error-${id}" style="display:none"></div>
    <button class="btn-primary" id="scan-btn-${id}" onclick="startScan('${id}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      Start scan
    </button>`;
}

function toggleSector(s, id) {
  if (selectedSectors.includes(s)) {
    if (selectedSectors.length > 1) selectedSectors = selectedSectors.filter(x => x !== s);
  } else { selectedSectors.push(s); }
  document.querySelectorAll(`#sector-btns-${id} .sector-btn`).forEach(b => b.classList.toggle("active", selectedSectors.includes(b.textContent)));
  // sync both forms
  const otherId = id === "dash" ? "scan" : "dash";
  const otherBtns = document.querySelectorAll(`#sector-btns-${otherId} .sector-btn`);
  otherBtns.forEach(b => b.classList.toggle("active", selectedSectors.includes(b.textContent)));
}

function updateCount(val, id) {
  companyCount = Number(val);
  document.querySelectorAll(`[id^="count-label-"]`).forEach(el => el.textContent = val);
  document.querySelectorAll("input[type=range]").forEach(el => el.value = val);
}

async function startScan(formId) {
  const btn = document.getElementById("scan-btn-" + formId);
  const errEl = document.getElementById("error-" + formId);
  const progEl = document.getElementById("sector-progress-" + formId);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Scannen...';
  errEl.style.display = "none";

  // Show per-sector progress
  progEl.style.display = "flex";
  progEl.innerHTML = selectedSectors.map(s => `
    <div class="sector-load-row" id="prog-${formId}-${s}">
      <span class="s-name">${s}</span>
      <div class="s-bar"><div class="s-bar-fill" id="bar-${formId}-${s}"></div></div>
      <span class="s-status" id="status-${formId}-${s}">Wachten...</span>
    </div>`).join("");

  const results = [];
  let hasError = false;

  await Promise.all(selectedSectors.map(async sector => {
    const rowEl = document.getElementById(`prog-${formId}-${sector}`);
    const barEl = document.getElementById(`bar-${formId}-${sector}`);
    const statEl = document.getElementById(`status-${formId}-${sector}`);
    statEl.textContent = "Scannen...";
    barEl.style.width = "30%";

    let attempt = 0;
    while (attempt < 3) {
      try {
        const res = await scanSector(sector);
        results.push(...res);
        barEl.style.width = "100%";
        statEl.textContent = `${res.length} gevonden`;
        rowEl.classList.add("done");
        break;
      } catch(e) {
        attempt++;
        if (attempt >= 3) {
          barEl.style.width = "100%";
          barEl.style.background = "#c00";
          statEl.textContent = "Mislukt";
          rowEl.classList.add("error-row");
          hasError = true;
        } else {
          statEl.textContent = `Retry ${attempt}...`;
          await new Promise(r => setTimeout(r, 1000 * attempt));
        }
      }
    }
  }));

  if (results.length > 0) {
    const now = new Date();
    history.unshift({
      id: Date.now(),
      label: selectedSectors.join(", "),
      date: now.toLocaleDateString("nl-NL", {day:"numeric",month:"long",year:"numeric"}),
      results,
      sectors: [...selectedSectors],
    });
    save();
    activeSector = "Alle";
    setTimeout(() => {
      progEl.style.display = "none";
      renderDashboard();
      navigate("dashboard");
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.page === "dashboard"));
    }, 800);
  } else {
    errEl.textContent = "Alle sectoren mislukt. Controleer je API key en credits.";
    errEl.style.display = "block";
  }

  btn.disabled = false;
  btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>Start scan';
}

async function scanSector(sector) {
  const prompt = `Je bent een recruitment data-analist. Zoek ${companyCount} echte Nederlandse bedrijven in de sector "${sector}".
Analyseer voor elk: noSocials (geen actieve social media), noJobBoards (geen vacaturebanken zoals Indeed of Jobbird), noRecruitmentAds (geen betaalde wervingsadvertenties).
Geef ook voor elk bedrijf indien beschikbaar: een email-adres (contact_email) en telefoonnummer (contact_phone). Als niet beschikbaar, gebruik null.
Reageer ALLEEN met een JSON-array, geen backticks of uitleg:
[{"name":"...","website":"...","sector":"${sector}","contact_email":"...","contact_phone":"...","scores":{"noSocials":true,"noJobBoards":false,"noRecruitmentAds":true},"summary":"..."}]`;

  const res = await fetch(PROXY, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      model: "claude-3-5-sonnet-20241022",
      max_tokens: 1500,
      messages: [{role:"user", content: prompt}]
    })
  });

  const data = await res.json();
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${data?.error?.message || JSON.stringify(data)}`);
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

  const text = (data.content||[]).map(i => i.text||"").filter(Boolean).join("\n");
  const clean = text.replace(/```json|```/g,"").trim();
  const s = clean.indexOf("["), e = clean.lastIndexOf("]");
  if (s === -1) throw new Error("Geen JSON ontvangen");
  return JSON.parse(clean.slice(s, e+1));
}

// Dashboard
function renderDashboard() {
  if (!history.length) {
    document.getElementById("dash-stats").style.display = "none";
    document.getElementById("dash-prev").style.display = "none";
    return;
  }

  const latest = history[0];
  const res = latest.results;
  const avg = Math.round(res.reduce((s,c) => s + Object.values(c.scores).filter(Boolean).length, 0) / res.length * 33.33);
  const tot = res.filter(c => Object.values(c.scores).filter(Boolean).length === 3).length;

  const statsEl = document.getElementById("dash-stats");
  statsEl.style.display = "block";

  const tabs = ["Alle", ...latest.sectors];
  const filtered = (activeSector === "Alle" ? res : res.filter(c => c.sector === activeSector))
    .sort((a,b) => Object.values(b.scores).filter(Boolean).length - Object.values(a.scores).filter(Boolean).length);

  statsEl.innerHTML = `
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-value">${res.length}</div><div class="stat-label">Gevonden</div></div>
      <div class="stat-box"><div class="stat-value">${avg}%</div><div class="stat-label">Gem. score</div></div>
      <div class="stat-box"><div class="stat-value">${tot}</div><div class="stat-label">100% verborgen</div></div>
    </div>
    <div class="tab-bar">${tabs.map(s=>`<button class="tab ${s===activeSector?'active':''}" onclick="setActiveSector('${s}')">${s}</button>`).join("")}</div>
    <div class="table-header"><span>Bedrijf</span><span>Sector</span><span>Score</span><span>Status</span><span></span></div>
    <div>${filtered.map(c => {
      const sc = Object.values(c.scores).filter(Boolean).length;
      const cData = JSON.stringify(c).replace(/\\/g,"\\\\").replace(/'/g,"&#39;").replace(/"/g,"&quot;");
      return `<div class="table-row" onclick="openCompany(${cData})">
        <div><div class="company-name">${c.name}</div>${c.website?`<div class="company-website">${c.website}</div>`:""}</div>
        <div style="font-size:12px;color:#888">${c.sector}</div>
        ${scoreBarHTML(sc)}
        ${statusBadgeHTML(c)}
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.8" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>`;
    }).join("")}</div>
    <div style="margin-top:48px"></div>`;

  // Prev scans
  const prevEl = document.getElementById("dash-prev");
  if (history.length > 1) {
    prevEl.style.display = "block";
    prevEl.innerHTML = `<div class="section-label">Eerdere scans</div>
      <div class="history-list">${history.slice(1).map(h=>`
        <div class="history-row" onclick="openScan(${h.id})">
          <div><div class="history-title">${h.label}</div><div class="history-sub">${h.date} · ${h.results.length} bedrijven</div></div>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.8" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>`).join("")}
      </div><div style="margin-top:48px"></div>`;
  } else { prevEl.style.display = "none"; }
}

function setActiveSector(s) { activeSector = s; renderDashboard(); }

function renderHistory() {
  const el = document.getElementById("history-content");
  if (!history.length) { el.innerHTML = '<div class="empty-msg">Nog geen scans uitgevoerd.</div>'; return; }
  el.innerHTML = `<div class="history-list">${history.map(h=>`
    <div class="history-row" onclick="openScan(${h.id})">
      <div><div class="history-title">${h.label}</div><div class="history-sub">${h.date} · ${h.results.length} bedrijven · ${h.sectors.join(", ")}</div></div>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.8" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
    </div>`).join("")}</div>`;
}

// Company modal
function openCompany(c) {
  if (typeof c === "string") c = JSON.parse(c);
  const k = companyKey(c);
  const sc = Object.values(c.scores).filter(Boolean).length;
  const curStatus = statuses[k] || "";
  const curNote = notes[k] || "";

  document.getElementById("modal-content").innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-title">${c.name}</div>
        ${c.website ? `<div class="modal-sub">${c.website}</div>` : ""}
      </div>
      <button class="close-btn" onclick="closeModal()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    ${(c.contact_email || c.contact_phone) ? `
    <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #f0f0f0">
      <div class="section-label" style="margin-bottom:10px">Contact</div>
      ${c.contact_email ? `<div class="contact-row"><span class="contact-label">Email</span><span class="contact-val"><a href="mailto:${c.contact_email}" style="color:#111">${c.contact_email}</a></span></div>` : ""}
      ${c.contact_phone ? `<div class="contact-row"><span class="contact-label">Telefoon</span><span class="contact-val">${c.contact_phone}</span></div>` : ""}
    </div>` : ""}

    <table class="criteria-table">
      ${CRITERIA.map(cr=>`<tr><td style="color:#555">${cr.label}</td><td><span class="${c.scores[cr.key]?'badge-hidden':'badge-visible'}">${c.scores[cr.key]?'Verborgen':'Zichtbaar'}</span></td></tr>`).join("")}
    </table>

    <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
      <span style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap">Score</span>
      ${scoreBarHTML(sc)}
    </div>

    <div style="margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid #f0f0f0">
      <div class="section-label">Status</div>
      <div class="status-options">
        ${["contacted","interested","not-interested"].map(s=>`
          <button class="status-opt ${curStatus===s?'active-'+s:''}" onclick="setStatus('${k}','${s}')">${STATUS_LABELS[s]}</button>
        `).join("")}
      </div>
    </div>

    <div style="margin-bottom:${c.summary?'24px':'0'}">
      <div class="section-label">Notitie</div>
      <textarea class="notes-area" id="note-${k}" placeholder="Voeg een notitie toe...">${curNote}</textarea>
      <button class="btn-ghost" style="margin-top:8px" onclick="saveNote('${k}')">Opslaan</button>
    </div>

    ${c.summary ? `<div class="modal-summary">${c.summary}</div>` : ""}`;

  document.getElementById("modal").style.display = "flex";
}

function setStatus(k, s) {
  statuses[k] = statuses[k] === s ? "" : s;
  save();
  renderDashboard();
  // re-render modal status buttons
  const opts = document.querySelectorAll(".status-opt");
  opts.forEach(btn => {
    const btnS = btn.textContent === STATUS_LABELS.contacted ? "contacted"
      : btn.textContent === STATUS_LABELS.interested ? "interested" : "not-interested";
    btn.className = "status-opt " + (statuses[k] === btnS ? "active-" + btnS : "");
  });
}

function saveNote(k) {
  const el = document.getElementById("note-" + k);
  if (el) { notes[k] = el.value; save(); }
  const btn = el?.nextElementSibling;
  if (btn) { btn.textContent = "Opgeslagen"; setTimeout(() => { btn.textContent = "Opslaan"; }, 1500); }
}

function openScan(id) {
  const scan = history.find(h => h.id === id);
  if (!scan) return;
  const avg = Math.round(scan.results.reduce((s,c) => s + Object.values(c.scores).filter(Boolean).length,0) / scan.results.length * 33.33);
  const tot = scan.results.filter(c => Object.values(c.scores).filter(Boolean).length === 3).length;
  const sorted = [...scan.results].sort((a,b) => Object.values(b.scores).filter(Boolean).length - Object.values(a.scores).filter(Boolean).length);

  document.getElementById("modal-content").innerHTML = `
    <div class="modal-header" style="border-bottom:1px solid #f0f0f0;padding-bottom:20px;margin-bottom:24px">
      <div><div class="modal-title">${scan.label}</div><div class="modal-sub">${scan.date}</div></div>
      <button class="close-btn" onclick="closeModal()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="stats-grid" style="margin-bottom:24px">
      <div class="stat-box"><div class="stat-value" style="font-size:22px">${scan.results.length}</div><div class="stat-label">Gevonden</div></div>
      <div class="stat-box"><div class="stat-value" style="font-size:22px">${avg}%</div><div class="stat-label">Gem. score</div></div>
      <div class="stat-box"><div class="stat-value" style="font-size:22px">${tot}</div><div class="stat-label">100% verborgen</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 90px 80px 110px 20px;gap:12px;padding:10px 0;border-bottom:1px solid #111">
      ${["Bedrijf","Sector","Score","Status",""].map(h=>`<span style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.09em">${h}</span>`).join("")}
    </div>
    ${sorted.map(c => {
      const sc = Object.values(c.scores).filter(Boolean).length;
      const cData = JSON.stringify(c).replace(/\\/g,"\\\\").replace(/'/g,"&#39;").replace(/"/g,"&quot;");
      return `<div class="table-row" style="grid-template-columns:1fr 90px 80px 110px 20px" onclick="openCompany(${cData})">
        <div><div class="company-name">${c.name}</div>${c.website?`<div class="company-website">${c.website}</div>`:""}</div>
        <div style="font-size:12px;color:#888">${c.sector}</div>
        ${scoreBarHTML(sc)}
        ${statusBadgeHTML(c)}
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.8" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>`;
    }).join("")}`;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() { document.getElementById("modal").style.display = "none"; }

// Init
document.getElementById("dash-scan-form").innerHTML = scanFormHTML("dash");
document.getElementById("scan-form").innerHTML = scanFormHTML("scan");
renderDashboard();
</script>
</body>
</html>
